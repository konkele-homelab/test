name: GitHub Runner Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: dev

    container:
      image: alpine:3.22

    steps:
      - name: Show runner information
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          hostname
          uname -a

      - name: Show container
        run: |
          cat /etc/os-release

      - name: Test networking
        run: |
          wget -qO- https://api.github.com | head
